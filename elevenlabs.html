<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-insights - OpenClaw Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; padding: 30px; color: #fff; }
        .header { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.2)); border-radius: 20px; padding: 25px 35px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(245, 158, 11, 0.2); }
        .header h1 { font-size: 2em; color: #f59e0b; }
        .back-link { color: #f59e0b; text-decoration: none; padding: 12px 24px; background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; font-weight: 500; transition: all 0.3s; }
        .back-link:hover { background: #f59e0b; color: #fff; }
        .section { background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 45, 0.95)); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .section h2 { color: #f59e0b; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid rgba(245, 158, 11, 0.3); font-size: 1.3em; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
        .chart-container { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-title { font-size: 0.9em; color: rgba(255,255,255,0.6); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .agent-card { padding: 25px; border-radius: 20px; border-left: 5px solid; margin-bottom: 20px; background: rgba(255,255,255,0.03); }
        .agent-card.rupeeboss { border-left-color: #667eea; }
        .agent-card.livealth { border-left-color: #f59e0b; }
        .agent-card.saffronstays { border-left-color: #ec4899; }
        .agent-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .agent-icon { font-size: 3em; }
        .agent-name { font-size: 1.5em; font-weight: 700; color: #fff; }
        .agent-id { font-size: 0.8em; color: rgba(255,255,255,0.4); font-family: monospace; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .stat-box:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }
        .stat-value { font-size: 2.5em; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.8em; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 5px; }
        .total-bar { padding: 25px; border-radius: 16px; background: linear-gradient(135deg, #10b981, #059669); display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .total-label { font-size: 1.3em; font-weight: 700; }
        .total-value { font-size: 2em; font-weight: 800; }
        .updated { text-align: center; margin-top: 15px; color: rgba(255,255,255,0.4); }
        .info-box { background: rgba(16, 185, 129, 0.1); border-radius: 12px; padding: 15px; margin-top: 20px; color: #10b981; font-size: 0.9em; border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎙️ D-insights Voice Agents</h1>
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>
    
    <!-- Charts -->
    <div class="section">
        <h2>📈 Usage Trends</h2>
        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-title">📊 Calls Over Time</div>
                <div style="height: 250px;"><canvas id="callsChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">💰 Cost Over Time</div>
                <div style="height: 250px;"><canvas id="costChart"></canvas></div>
            </div>
        </div>
    </div>
    
    <!-- Current Stats -->
    <div id="content"><div style="text-align: center; padding: 40px; color: #999;">Loading...</div></div>

    <script>
        Promise.all([
            fetch('elevenlabs_costs.json').then(r => r.json()),
            fetch('elevenlabs_history.json').then(r => r.json()).catch(() => ({history: []}))
        ]).then(([currentData, historyData]) => {
            // Charts
            const labels = historyData.history.map(h => h.date.split('-').slice(1).join('/'));
            const rupeebossCalls = historyData.history.map(h => h.Rupeeboss?.calls || 0);
            const livealthCalls = historyData.history.map(h => h.Livealth_Bio_Pharma?.calls || 0);
            const rupeebossCost = historyData.history.map(h => parseFloat(h.Rupeeboss?.cost || 0));
            const livealthCost = historyData.history.map(h => parseFloat(h.Livealth_Bio_Pharma?.cost || 0));
            
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: 'rgba(255,255,255,0.7)', boxWidth: 12, padding: 15 } } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                }
            };
            
            new Chart(document.getElementById('callsChart'), {
                type: 'bar',
                data: { labels, datasets: [
                    { label: 'Rupeeboss', data: rupeebossCalls, backgroundColor: '#667eea', borderRadius: 8 },
                    { label: 'Livealth', data: livealthCalls, backgroundColor: '#f59e0b', borderRadius: 8 },
                    { label: 'SaffronStays', data: saffronstaysCalls, backgroundColor: '#ec4899', borderRadius: 8 }
                ]},
                options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, beginAtZero: true } } }
            });
            
            new Chart(document.getElementById('costChart'), {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Rupeeboss', data: rupeebossCost, borderColor: '#667eea', backgroundColor: 'rgba(102, 126, 234, 0.1)', fill: true, tension: 0.3 },
                    { label: 'Livealth', data: livealthCost, borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', fill: true, tension: 0.3 },
                    { label: 'SaffronStays', data: saffronstaysCost, borderColor: '#ec4899', backgroundColor: 'rgba(236, 72, 153, 0.1)', fill: true, tension: 0.3 }
                ]},
                options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, beginAtZero: true, ticks: { callback: v => '$' + v.toFixed(2) } } } }
            });
            
            // Agent Cards
            let html = '<div class="section"><h2>🎯 Current Stats</h2>';
            
            if (currentData.agents) {
                for (const [name, agent] of Object.entries(currentData.agents)) {
                    const cardClass = name.includes('Livealth') ? 'livealth' : name.includes('Saffron') ? 'saffronstays' : 'rupeeboss';
                    const displayName = name.replace(/_/g, ' ');
                    const icon = cardClass === 'rupeeboss' ? '🏦' : cardClass === 'livealth' ? '💊' : '🏡';
                                <div>
                                    <div class="agent-name">${displayName}</div>
                                    <div class="agent-id">${agent.agent_id}</div>
                                </div>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-box">
                                    <div class="stat-value">${agent.calls}</div>
                                    <div class="stat-label">Calls (7 days)</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${agent.minutes}</div>
                                    <div class="stat-label">Est. Minutes</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">$${parseFloat(agent.cost).toFixed(2)}</div>
                                    <div class="stat-label">Est. Cost</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (currentData.totals) {
                html += `
                    <div class="total-bar">
                        <span class="total-label">💰 Total Estimated Cost</span>
                        <span class="total-value">$${parseFloat(currentData.totals.cost).toFixed(2)}</span>
                    </div>
                `;
            }
            
            if (currentData.last_updated) {
                html += `<div class="updated">Last updated: ${currentData.last_updated}</div>`;
            }
            
            html += `
                <div class="info-box">
                    <strong>ℹ️ Note:</strong> These are Estimated Costs. Tracking up to 30 days of history.
                </div>
            </div>`;
            
            document.getElementById('content').innerHTML = html;
        });
    </script>
</body>
</html>
