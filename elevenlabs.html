<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-insights - OpenClaw Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%); min-height: 100vh; padding: 30px; color: #fff; }
        .header { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.2)); border-radius: 20px; padding: 25px 35px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(245, 158, 11, 0.2); }
        .header h1 { font-size: 2em; color: #f59e0b; }
        .back-link { color: #f59e0b; text-decoration: none; padding: 12px 24px; background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; font-weight: 500; transition: all 0.3s; }
        .back-link:hover { background: #f59e0b; color: #fff; }
        .section { background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 45, 0.95)); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); }
        .section h2 { color: #f59e0b; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid rgba(245, 158, 11, 0.3); font-size: 1.3em; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
        .chart-container { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .chart-title { font-size: 0.9em; color: rgba(255,255,255,0.6); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .agent-card { padding: 25px; border-radius: 20px; border-left: 5px solid; margin-bottom: 20px; background: rgba(255,255,255,0.03); }
        .agent-card.rupeeboss { border-left-color: #667eea; }
        .agent-card.livealth { border-left-color: #f59e0b; }
        .agent-card.saffronstays { border-left-color: #ec4899; }
        .agent-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .agent-icon { font-size: 3em; }
        .agent-name { font-size: 1.5em; font-weight: 700; color: #fff; }
        .agent-id { font-size: 0.8em; color: rgba(255,255,255,0.4); font-family: monospace; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .stat-box:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); }
        .stat-value { font-size: 2.5em; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.8em; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 5px; }
        .total-bar { padding: 25px; border-radius: 16px; background: linear-gradient(135deg, #10b981, #059669); display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .total-label { font-size: 1.3em; font-weight: 700; }
        .total-value { font-size: 2em; font-weight: 800; }
        .updated { text-align: center; margin-top: 15px; color: rgba(255,255,255,0.4); }
        .info-box { background: rgba(16, 185, 129, 0.1); border-radius: 12px; padding: 15px; margin-top: 20px; color: #10b981; font-size: 0.9em; border: 1px solid rgba(16, 185, 129, 0.2); }
        .error-box { background: rgba(239, 68, 68, 0.1); border-radius: 12px; padding: 15px; margin-top: 20px; color: #ef4444; font-size: 0.9em; border: 1px solid rgba(239, 68, 68, 0.2); }
        .prev-day-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.06); }
        .prev-day-title { font-size: 0.8em; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .prev-day-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .prev-day-item { text-align: center; }
        .prev-day-val { font-size: 1.3em; font-weight: 700; color: rgba(255,255,255,0.7); }
        .prev-day-lbl { font-size: 0.7em; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 3px; }
        .retry-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; font-weight: 600; }

        /* History Table Styles */
        .history-section { margin-top: 30px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .history-table th { background: rgba(255,255,255,0.08); padding: 12px; text-align: left; font-weight: 600; color: #f59e0b; border-bottom: 2px solid rgba(245, 158, 11, 0.3); font-size: 0.85em; text-transform: uppercase; }
        .history-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9em; }
        .history-table tr:hover { background: rgba(255,255,255,0.03); }
        .history-table .date-col { color: rgba(255,255,255,0.7); font-weight: 500; }
        .history-table .calls-col { color: #667eea; font-weight: 600; }
        .history-table .mins-col { color: #f59e0b; font-weight: 600; }
        .history-table .cost-col { color: #10b981; font-weight: 600; }
        .agent-table { margin-bottom: 30px; }
        .agent-table h3 { color: #fff; margin-bottom: 15px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎙️ D-insights Voice Agents</h1>
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>
    
    <!-- Charts -->
    <div class="section">
        <h2>📈 Usage Trends</h2>
        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-title">📊 Calls Over Time</div>
                <div style="height: 250px;"><canvas id="callsChart"></canvas></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">💰 Cost Over Time</div>
                <div style="height: 250px;"><canvas id="costChart"></canvas></div>
            </div>
        </div>
    </div>
    
    <!-- Current Stats -->
    <div id="content"><div class="loading">Loading data...</div></div>

    <script>
        let callsChart = null;
        let costChart = null;
        let historyCache = null;
        
        function loadData() {
            const contentDiv = document.getElementById('content');
            
            Promise.all([
                fetch('elevenlabs_costs.json').then(r => {
                    if (!r.ok) throw new Error('Failed to load costs data: ' + r.status);
                    return r.json();
                }),
                fetch('elevenlabs_history.json').then(r => {
                    if (!r.ok) throw new Error('Failed to load history data: ' + r.status);
                    return r.json();
                }).catch(() => ({history: []}))
            ]).then(([currentData, historyData]) => {
                historyCache = historyData.history || [];
                renderCharts(historyData);
                renderStats(currentData, historyCache);
            }).catch(error => {
                console.error('Error loading data:', error);
                contentDiv.innerHTML = `
                    <div class="error-box">
                        <strong>❌ Error loading data:</strong> ${error.message}<br>
                        <button class="retry-btn" onclick="loadData()">🔄 Retry</button>
                    </div>
                `;
            });
        }
        
        function renderCharts(historyData) {
            const history = historyData.history || [];
            
            if (history.length === 0) {
                console.log('No history data available');
                return;
            }
            
            const labels = history.map(h => h.date.split('-').slice(1).join('/'));
            const rupeebossCalls = history.map(h => h.Rupeeboss?.calls || 0);
            const livealthCalls = history.map(h => h.Livealth_Bio_Pharma?.calls || 0);
            const saffronstaysCalls = history.map(h => h.SaffronStays?.calls || 0);
            const rupeebossCost = history.map(h => parseFloat(h.Rupeeboss?.cost || 0));
            const livealthCost = history.map(h => parseFloat(h.Livealth_Bio_Pharma?.cost || 0));
            const saffronstaysCost = history.map(h => parseFloat(h.SaffronStays?.cost || 0));
            
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: 'rgba(255,255,255,0.7)', boxWidth: 12, padding: 15 } } },
                scales: {
                    x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                }
            };
            
            if (callsChart) callsChart.destroy();
            if (costChart) costChart.destroy();
            
            callsChart = new Chart(document.getElementById('callsChart'), {
                type: 'bar',
                data: { labels, datasets: [
                    { label: 'Rupeeboss', data: rupeebossCalls, backgroundColor: '#667eea', borderRadius: 8 },
                    { label: 'Livealth', data: livealthCalls, backgroundColor: '#f59e0b', borderRadius: 8 },
                    { label: 'SaffronStays', data: saffronstaysCalls, backgroundColor: '#ec4899', borderRadius: 8 }
                ]},
                options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, beginAtZero: true } } }
            });
            
            costChart = new Chart(document.getElementById('costChart'), {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Rupeeboss', data: rupeebossCost, borderColor: '#667eea', backgroundColor: 'rgba(102, 126, 234, 0.1)', fill: true, tension: 0.3 },
                    { label: 'Livealth', data: livealthCost, borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', fill: true, tension: 0.3 },
                    { label: 'SaffronStays', data: saffronstaysCost, borderColor: '#ec4899', backgroundColor: 'rgba(236, 72, 153, 0.1)', fill: true, tension: 0.3 }
                ]},
                options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, beginAtZero: true, ticks: { callback: v => '$' + v.toFixed(2) } } } }
            });
        }
        
        function getPrevDayData(agentName, history) {
            if (!history || history.length < 2) {
                return { date: 'N/A', calls: 0, minutes: 0, cost: 0 };
            }
            
            // Sort by date ascending to get chronological order
            const sorted = [...history].sort((a, b) => a.date.localeCompare(b.date));
            
            // Get second-to-last entry (previous day before latest)
            const prevDay = sorted[sorted.length - 2];
            
            const data = prevDay[agentName] || { calls: 0, cost: 0 };
            return {
                date: prevDay.date,
                calls: data.calls || 0,
                minutes: Math.round((data.calls || 0) * 1.8),
                cost: parseFloat(data.cost || 0).toFixed(2)
            };
        }
        
        function renderStats(currentData, history) {
            const contentDiv = document.getElementById('content');
            
            let html = '<div class="section"><h2>🎯 Current Stats</h2>';
            
            if (currentData.agents) {
                for (const [name, agent] of Object.entries(currentData.agents)) {
                    const cardClass = name.includes('Livealth') ? 'livealth' : name.includes('Saffron') ? 'saffronstays' : 'rupeeboss';
                    const displayName = name.replace(/_/g, ' ');
                    const icon = cardClass === 'rupeeboss' ? '🏦' : cardClass === 'livealth' ? '💊' : '🏡';
                    
                    // Get previous day data from history
                    const prevDay = getPrevDayData(name, history);
                    
                    html += `
                        <div class="agent-card ${cardClass}">
                            <div class="agent-header">
                                <span class="agent-icon">${icon}</span>
                                <div>
                                    <div class="agent-name">${displayName}</div>
                                    <div class="agent-id">${agent.agent_id || 'N/A'}</div>
                                </div>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-box">
                                    <div class="stat-value">${agent.calls || 0}</div>
                                    <div class="stat-label">Calls (7 days)</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${agent.minutes || 0}</div>
                                    <div class="stat-label">Est. Minutes</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">$${parseFloat(agent.cost || 0).toFixed(2)}</div>
                                    <div class="stat-label">Est. Cost</div>
                                </div>
                            </div>
                            
                            <!-- Previous Day Stats -->
                            <div class="prev-day-box">
                                <div class="prev-day-title">📅 Previous Day (${prevDay.date || 'N/A'})</div>
                                <div class="prev-day-grid">
                                    <div class="prev-day-item">
                                        <div class="prev-day-val">${prevDay.calls || 0}</div>
                                        <div class="prev-day-lbl">Calls</div>
                                    </div>
                                    <div class="prev-day-item">
                                        <div class="prev-day-val">${prevDay.minutes || 0}</div>
                                        <div class="prev-day-lbl">Minutes</div>
                                    </div>
                                    <div class="prev-day-item">
                                        <div class="prev-day-val">$${parseFloat(prevDay.cost || 0).toFixed(2)}</div>
                                        <div class="prev-day-lbl">Cost</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            
            if (currentData.totals) {
                html += `
                    <div class="total-bar">
                        <span class="total-label">💰 Total Estimated Cost</span>
                        <span class="total-value">$${parseFloat(currentData.totals.cost || 0).toFixed(2)}</span>
                    </div>
                `;
            }
            
            if (currentData.last_updated) {
                html += `<div class="updated">Last updated: ${currentData.last_updated}</div>`;
            }
            
            html += `
                <div class="info-box">
                    <strong>ℹ️ Note:</strong> These are Estimated Costs. Tracking up to 30 days of history.
                </div>
            </div>`;

            // Add History Tables Section
            html += '<div class="section history-section"><h2>📜 Previous Days History</h2>';
            
            if (history && history.length > 0) {
                // Sort history by date descending (latest first)
                const sortedHistory = [...history].reverse();
                
                // Rupeeboss History Table
                html += `
                    <div class="agent-table">
                        <h3>🏦 Rupeeboss</h3>
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Calls</th>
                                    <th>Minutes</th>
                                    <th>Cost</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sortedHistory.map(h => {
                                    const data = h.Rupeeboss || { calls: 0, cost: 0 };
                                    const mins = Math.round((data.calls || 0) * 1.8);
                                    return `
                                        <tr>
                                            <td class="date-col">${h.date}</td>
                                            <td class="calls-col">${data.calls || 0}</td>
                                            <td class="mins-col">${mins}</td>
                                            <td class="cost-col">$${parseFloat(data.cost || 0).toFixed(2)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                // Livealth History Table
                html += `
                    <div class="agent-table">
                        <h3>💊 Livealth Bio Pharma</h3>
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Calls</th>
                                    <th>Minutes</th>
                                    <th>Cost</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sortedHistory.map(h => {
                                    const data = h.Livealth_Bio_Pharma || { calls: 0, cost: 0 };
                                    const mins = Math.round((data.calls || 0) * 1.8);
                                    return `
                                        <tr>
                                            <td class="date-col">${h.date}</td>
                                            <td class="calls-col">${data.calls || 0}</td>
                                            <td class="mins-col">${mins}</td>
                                            <td class="cost-col">$${parseFloat(data.cost || 0).toFixed(2)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                // SaffronStays History Table
                html += `
                    <div class="agent-table">
                        <h3>🏡 SaffronStays</h3>
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Calls</th>
                                    <th>Minutes</th>
                                    <th>Cost</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sortedHistory.map(h => {
                                    const data = h.SaffronStays || { calls: 0, cost: 0 };
                                    const mins = Math.round((data.calls || 0) * 1.8);
                                    return `
                                        <tr>
                                            <td class="date-col">${h.date}</td>
                                            <td class="calls-col">${data.calls || 0}</td>
                                            <td class="mins-col">${mins}</td>
                                            <td class="cost-col">$${parseFloat(data.cost || 0).toFixed(2)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                html += '<p style="color: rgba(255,255,255,0.5); text-align: center;">No historical data available yet.</p>';
            }
            
            html += '</div>';
            
            contentDiv.innerHTML = html;
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
